name: Compiler core

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Core / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15, windows-2025]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
      - name: Initialize the MSVC x64 toolchain
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64
      - name: Configure compiler
        shell: bash
        run: |
          arguments=(--preset dev)
          if [[ "$RUNNER_OS" == Windows ]]; then
            arguments+=("-DCMAKE_CXX_COMPILER=cl.exe")
          fi
          cmake "${arguments[@]}"
      - name: Build compiler and unit tests
        run: cmake --build --preset dev --parallel
      - name: Run compiler tests
        run: ctest --preset dev
