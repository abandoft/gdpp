name: Compiler core

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Core / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Initialize the MSVC x64 toolchain
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Configure compiler
        shell: bash
        run: |
          arguments=(--preset dev)
          if [[ "$RUNNER_OS" == Windows ]]; then
            arguments+=("-DCMAKE_CXX_COMPILER=cl.exe")
          fi
          cmake "${arguments[@]}"
      - name: Build compiler and unit tests
        run: cmake --build --preset dev --parallel
      - name: Run compiler tests
        run: ctest --preset dev
