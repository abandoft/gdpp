name: Compiler core

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Core / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15, windows-2025]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
      - name: Initialize the MSVC x64 toolchain
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64
      - name: Configure compiler
        shell: bash
        run: |
          arguments=(--preset dev)
          if [[ "$RUNNER_OS" == Windows ]]; then
            arguments+=("-DCMAKE_CXX_COMPILER=cl.exe")
          fi
          cmake "${arguments[@]}"
      - name: Build compiler and unit tests
        run: cmake --build --preset dev --parallel
      - name: Run compiler tests
        run: ctest --preset dev

  ubsan:
    name: Core / Ubuntu / undefined behavior
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
      - name: Configure undefined-behavior instrumentation
        shell: bash
        run: |
          cmake -S . -B build/ci-ubsan -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DGDPP_BUILD_EXTENSION=OFF \
            -DGDPP_BUILD_TESTS=ON \
            -DGDPP_WARNINGS_AS_ERRORS=ON \
            '-DCMAKE_CXX_FLAGS=-fsanitize=undefined -fno-sanitize-recover=undefined -fno-omit-frame-pointer' \
            '-DCMAKE_EXE_LINKER_FLAGS=-fsanitize=undefined'
      - name: Build instrumented compiler and tests
        run: cmake --build build/ci-ubsan --parallel
      - name: Run instrumented compiler tests
        env:
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir build/ci-ubsan --output-on-failure

  asan:
    name: Core / Ubuntu / address safety
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
      - name: Configure address-safety instrumentation
        shell: bash
        run: |
          cmake -S . -B build/ci-asan -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DGDPP_BUILD_EXTENSION=OFF \
            -DGDPP_BUILD_TESTS=ON \
            -DGDPP_WARNINGS_AS_ERRORS=ON \
            '-DCMAKE_CXX_FLAGS=-fsanitize=address -fno-omit-frame-pointer' \
            '-DCMAKE_EXE_LINKER_FLAGS=-fsanitize=address'
      - name: Build instrumented compiler and tests
        run: cmake --build build/ci-asan --parallel
      - name: Run instrumented compiler tests
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=1
        run: ctest --test-dir build/ci-asan --output-on-failure
