name: Godot compatibility

on:
  workflow_call:
    inputs:
      target:
        description: Compatibility target to run
        type: string
        required: false
        default: all
  workflow_dispatch:
    inputs:
      target:
        description: Compatibility target to run
        type: choice
        required: true
        default: all
        options:
          - all
          - official-corpus
          - 4.4.1
          - 4.5.2
          - 4.6.3
          - 4.7

permissions:
  contents: read

concurrency:
  group: godot-compatibility-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    if: ${{ inputs.target != 'official-corpus' }}
    name: Godot / ${{ matrix.version }}
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(inputs.target != 'all' && inputs.target != 'official-corpus' && format('["{0}"]', inputs.target) || '["4.4.1","4.5.2","4.6.3","4.7"]') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
      - id: godot
        uses: ./.github/actions/setup-godot
        with:
          version: ${{ matrix.version }}
          templates: linux
      - name: Configure compiler plugin and SDK
        shell: bash
        run: |
          sdk_version="$(printf '%s' '${{ matrix.version }}' | cut -d. -f1,2)"
          cmake --preset plugin \
            -DGDPP_GODOT_EXECUTABLE=${{ steps.godot.outputs.executable }} \
            -DGDPP_PACKAGE_GODOT_VERSIONS="$sdk_version"
      - name: Build compiler plugin and direct native targets
        run: cmake --build --preset plugin --parallel
      - name: Run compiler and Godot integration tests
        run: ctest --preset plugin
      - name: Export and run independent GDExtension inheritance project
        shell: bash
        env:
          GODOT: ${{ steps.godot.outputs.executable }}
          GODOT_VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          fixture=build/plugin/attached-extension-project
          output="$fixture/export"
          mkdir -p "$output"
          cp "$fixture/extension_list.compiler.cfg" \
            "$fixture/.godot/extension_list.cfg"

          "$GODOT" --headless --editor --path "$fixture" --import \
            2>&1 | tee "$output/gdpp-attached-import.log"
          "$GODOT" --headless --editor --path "$fixture" \
            --export-release 'Linux x86_64' \
            "$GITHUB_WORKSPACE/$output/gdpp-attached.x86_64" \
            2>&1 | tee "$output/gdpp-attached-export.log"

          test -x "$output/gdpp-attached.x86_64"
          test -f "$output/gdpp-attached.pck"
          test -f "$fixture/addons/vendor/binary/libgdpp_test_vendor.release.linux.x86_64.so"
          test -f "$fixture/addons/gdpp/binary/libgdpp_project.release.linux.x86_64.so"
          timeout 15s "$output/gdpp-attached.x86_64" --headless \
            2>&1 | tee "$output/gdpp-attached-runtime.log"
          grep -q '^GDPP_ATTACHED_EXPORT_RUNTIME_OK$' \
            "$output/gdpp-attached-runtime.log"
          grep -q 'GDPP_AOT_SUMMARY scenes=' "$output/gdpp-attached-export.log"

          audit=build/attached-pck-audit
          mkdir -p "$audit"
          cp tools/audit_attached_export_pck.gd "$audit/audit_attached_export_pck.gd"
          printf '[application]\nconfig/name="GDPP Attached PCK Audit"\n' \
            > "$audit/project.godot"
          "$GODOT" --headless --path "$audit" \
            --script "$GITHUB_WORKSPACE/$audit/audit_attached_export_pck.gd" -- \
            "$GITHUB_WORKSPACE/$output/gdpp-attached.pck" \
            2>&1 | tee "$output/gdpp-attached-pck-audit.log"
          grep -q '^GDPP_ATTACHED_PCK_VIOLATIONS=0$' \
            "$output/gdpp-attached-pck-audit.log"

          diagnostic_logs=(
            "$output/gdpp-attached-import.log"
            "$output/gdpp-attached-export.log"
            "$output/gdpp-attached-runtime.log"
            "$output/gdpp-attached-pck-audit.log"
          )
          if [[ "$GODOT_VERSION" == 4.4.* ]]; then
            # Godot 4.4's built-in GDScript parser does not understand typed
            # variadics. GDPP owns the source grammar, so these diagnostics are
            # non-authoritative as long as the AOT export and runtime assertions
            # above pass. Keep the allowlist exact so unrelated failures remain
            # release blockers.
            grep -q 'Parse Error: Expected parameter name\.' \
              "$output/gdpp-attached-import.log"
            typed_variadic_line="$(
              grep -n -m1 -E '\.\.\.[[:alpha:]_][[:alnum:]_]*[[:space:]]*:' \
                "$fixture/vendor_child.gd" | cut -d: -f1
            )"
            test -n "$typed_variadic_line"
            grep -Fq "GDScript::reload (res://vendor_child.gd:$typed_variadic_line)" \
              "$output/gdpp-attached-import.log"
            for log in \
                "$output/gdpp-attached-import.log" \
                "$output/gdpp-attached-export.log"; do
              sed -E \
                -e '/^SCRIPT ERROR: Parse Error: Expected parameter name\.$/d' \
                -e '/^SCRIPT ERROR: Parse Error: Could not resolve super class inheritance from "res:\/\/vendor_(child|grandchild)\.gd"\.$/d' \
                -e '/^[[:space:]]+at: GDScript::reload \(res:\/\/(export_main|vendor_child|vendor_grandchild)\.gd:[0-9]+\)$/d' \
                -e '/^ERROR: Failed to load script "res:\/\/(export_main|vendor_child|vendor_grandchild)\.gd" with error "Parse error"\.$/d' \
                -e '/^[[:space:]]+at: load \(modules\/gdscript\/gdscript\.cpp:[0-9]+\)$/d' \
                "$log" > "$log.authoritative"
            done
            diagnostic_logs=(
              "$output/gdpp-attached-import.log.authoritative"
              "$output/gdpp-attached-export.log.authoritative"
              "$output/gdpp-attached-runtime.log"
              "$output/gdpp-attached-pck-audit.log"
            )
          fi

          if grep -E -q '(^| )ERROR:|SCRIPT ERROR:|Parse Error:|WARNING:|Unable to open' \
              "${diagnostic_logs[@]}"; then
            echo 'Attached GDExtension export emitted a forbidden diagnostic.'
            exit 1
          fi
      - name: Preflight project and export plugin
        shell: bash
        env:
          GODOT: ${{ steps.godot.outputs.executable }}
        run: |
          set -euo pipefail
          mkdir -p \
            example/addons/gdpp/build/export/aot \
            example/addons/gdpp/build/export/debug \
            example/addons/gdpp/build/export/gds
          "$GODOT" --headless --editor --path example --quit-after 120 \
            2>&1 | tee example/addons/gdpp/build/export/gdpp-warmup.log
          "$GODOT" --headless --editor --path example --import \
            2>&1 | tee example/addons/gdpp/build/export/gdpp-preflight.log
          if grep -E -q '(^| )ERROR:|SCRIPT ERROR:|Parse Error:|WARNING:|Unable to open' \
              example/addons/gdpp/build/export/gdpp-preflight.log; then
            echo 'Godot project or export plugin failed its parse/load preflight.'
            exit 1
          fi
      - name: Export, run and audit binary-only project
        shell: bash
        env:
          GODOT: ${{ steps.godot.outputs.executable }}
        run: |
          set -euo pipefail
          output=example/addons/gdpp/build/export
          "$GODOT" --headless --editor --path example \
            --export-release 'Linux x86_64' \
            "$GITHUB_WORKSPACE/$output/aot/gdpp-runtime.x86_64" \
            2>&1 | tee "$output/gdpp-aot-export.log"
          project=example/addons/gdpp/binary/libgdpp_project.release.linux.x86_64.so
          test -x "$output/aot/gdpp-runtime.x86_64"
          test -f "$project"
          test "$(nm -D --defined-only "$project" | awk 'NF {print $NF}' | wc -l)" -eq 1
          nm -D --defined-only "$project" | awk 'NF {print $NF}' | \
            grep -qx gdpp_project_library_init
          if readelf -S "$project" | grep '\.symtab' >/dev/null; then
            echo 'Linux Release project library contains a normal symbol table.'
            exit 1
          fi
          timeout 15s "$output/aot/gdpp-runtime.x86_64" --headless --quit-after 2 \
            2>&1 | tee "$output/gdpp-aot-runtime.log"
          grep -q '^GDPP_EXPORTED_PROPERTIES_OK$' "$output/gdpp-aot-runtime.log"
          grep -q 'GDPP_AOT_SUMMARY scenes=' "$output/gdpp-aot-export.log"
          if grep -E -q '(^| )ERROR:|SCRIPT ERROR:|WARNING:|Unable to open' \
              "$output/gdpp-aot-export.log" "$output/gdpp-aot-runtime.log"; then
            echo 'AOT export or runtime emitted a forbidden diagnostic.'
            exit 1
          fi

          mkdir -p build/pck-audit
          cp tools/audit_export_pck.gd build/pck-audit/audit_export_pck.gd
          printf '[application]\nconfig/name="GDPP PCK Audit"\n' > build/pck-audit/project.godot
          "$GODOT" --headless --path build/pck-audit \
            --script "$GITHUB_WORKSPACE/build/pck-audit/audit_export_pck.gd" -- \
            "$GITHUB_WORKSPACE/$output/aot/gdpp-runtime.pck" \
            "$GITHUB_WORKSPACE/$output/aot" "$GITHUB_WORKSPACE/$project" \
            2>&1 | tee "$output/gdpp-pck-audit.log"
          grep -q '^PCK_AUDIT_VIOLATIONS=0$' "$output/gdpp-pck-audit.log"
          grep -q '^PCK_AUDIT_PROJECT_LIBRARIES=1$' "$output/gdpp-pck-audit.log"
      - name: Export and run optimized Debug project with script assertions
        shell: bash
        env:
          GODOT: ${{ steps.godot.outputs.executable }}
          GODOT_VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          output=example/addons/gdpp/build/export
          sdk_version="$(printf '%s' "$GODOT_VERSION" | cut -d. -f1,2)"
          test "$(find "example/addons/gdpp/sdk/$sdk_version/lib" -maxdepth 1 \
            -type f -name '*template_debug*' | wc -l)" -eq 0
          test "$(find "example/addons/gdpp/sdk/$sdk_version/lib" -maxdepth 1 \
            -type f -name '*template_release*' | wc -l)" -eq 1
          "$GODOT" --headless --editor --path example \
            --export-debug 'Linux x86_64' \
            "$GITHUB_WORKSPACE/$output/debug/gdpp-runtime-debug.x86_64" \
            2>&1 | tee "$output/gdpp-debug-export.log"
          project=example/addons/gdpp/binary/libgdpp_project.debug.linux.x86_64.so
          test -x "$output/debug/gdpp-runtime-debug.x86_64"
          test -f "$project"
          test "$(nm -D --defined-only "$project" | awk 'NF {print $NF}' | wc -l)" -eq 1
          nm -D --defined-only "$project" | awk 'NF {print $NF}' | \
            grep -qx gdpp_project_library_init
          if readelf -S "$project" | grep '\.symtab' >/dev/null; then
            echo 'Linux Debug project library was not Release-stripped.'
            exit 1
          fi
          timeout 15s "$output/debug/gdpp-runtime-debug.x86_64" --headless --quit-after 2 \
            2>&1 | tee "$output/gdpp-debug-runtime.log"
          grep -q '^GDPP_EXPORTED_PROPERTIES_OK$' "$output/gdpp-debug-runtime.log"
          grep -q 'GDPP_AOT_SUMMARY scenes=' "$output/gdpp-debug-export.log"
          if grep -E -q '(^| )ERROR:|SCRIPT ERROR:|WARNING:|Unable to open' \
              "$output/gdpp-debug-export.log" "$output/gdpp-debug-runtime.log"; then
            echo 'Optimized Debug export or runtime emitted a forbidden diagnostic.'
            exit 1
          fi
      - name: Compare GDScript and AOT behavior/performance
        shell: bash
        env:
          GODOT: ${{ steps.godot.outputs.executable }}
        run: |
          set -euo pipefail
          output=example/addons/gdpp/build/export
          "$GODOT" --headless --editor --path example \
            --export-release 'Linux GDScript Fallback' \
            "$GITHUB_WORKSPACE/$output/gds/gdpp-runtime-gds.x86_64" \
            2>&1 | tee "$output/gdpp-gds-export.log"
          if grep -E -q '(^| )ERROR:|SCRIPT ERROR:|WARNING:|Unable to open' \
              "$output/gdpp-gds-export.log"; then
            echo 'GDScript comparison export emitted a forbidden diagnostic.'
            exit 1
          fi
          python3 tools/run_runtime_matrix.py \
            --gds-executable "$output/gds/gdpp-runtime-gds.x86_64" \
            --aot-executable "$output/aot/gdpp-runtime.x86_64" \
            --gds-pck "$output/gds/gdpp-runtime-gds.pck" \
            --aot-pck "$output/aot/gdpp-runtime.pck" \
            --gds-artifact-directory "$output/gds" \
            --aot-artifact-directory "$output/aot" \
            --output "$output/runtime-matrix.json" \
            --work-directory example/addons/gdpp/build/runtime-matrix \
            --repeats 3 --samples 5 --iterations 10000 --enforce
      - name: Verify binary-only export fails closed without its SDK
        shell: bash
        env:
          GODOT: ${{ steps.godot.outputs.executable }}
        run: |
          set -euo pipefail
          sdk_version="$(printf '%s' '${{ matrix.version }}' | cut -d. -f1,2)"
          sdk="example/addons/gdpp/sdk/$sdk_version"
          project="example/addons/gdpp/binary/libgdpp_project.release.linux.x86_64.so"
          test -f "$project"
          mv "$sdk" "$sdk.unavailable"
          mv "$project" "$project.unavailable"
          restore_fault_injection() {
            mv "$sdk.unavailable" "$sdk" 2>/dev/null || true
            mv "$project.unavailable" "$project" 2>/dev/null || true
          }
          trap restore_fault_injection EXIT
          set +e
          "$GODOT" --headless --editor --path example \
            --export-pack 'Linux x86_64' \
            "$GITHUB_WORKSPACE/example/addons/gdpp/build/export/gdpp-must-fail.pck" \
            > example/addons/gdpp/build/export/gdpp-must-fail.log 2>&1
          status=$?
          set -e
          test "$status" -ne 0 || \
            grep -q 'binary-only export is blocked to prevent source disclosure' \
              example/addons/gdpp/build/export/gdpp-must-fail.log
          grep -q 'binary-only export is blocked to prevent source disclosure' \
            example/addons/gdpp/build/export/gdpp-must-fail.log
      - name: Upload compatibility evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: godot-${{ matrix.version }}-compatibility
          path: |
            example/addons/gdpp/build/export/*.log
            example/addons/gdpp/build/export/runtime-matrix.json
            build/plugin/attached-extension-project/export/*.log
          if-no-files-found: warn
          retention-days: 14

  official-corpus:
    if: ${{ inputs.target == 'all' || inputs.target == 'official-corpus' }}
    name: Official project and parser corpus
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
      - name: Configure pinned official corpus
        run: cmake --preset dev -DGDPP_ENABLE_OFFICIAL_CORPUS_TESTS=ON
      - name: Build compiler
        run: cmake --build --preset dev --parallel
      - name: Compile pinned official Godot projects and parser corpus
        run: >-
          ctest --preset dev --verbose --output-on-failure
          -R '^gdpp\.compatibility\.'
      - name: Upload compatibility report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: official-compatibility-reports
          path: |
            build/dev/compatibility/results/report.json
            build/dev/compatibility/parser-results/report.json
          if-no-files-found: warn
          retention-days: 14
