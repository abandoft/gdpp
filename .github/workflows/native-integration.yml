name: Native plugin integration

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plugin:
    name: Plugin / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Initialize the MSVC x64 toolchain
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Configure compiler GDExtension
        shell: bash
        run: |
          arguments=(--preset plugin)
          if [[ "$RUNNER_OS" == Windows ]]; then
            arguments+=("-DCMAKE_CXX_COMPILER=cl.exe")
          fi
          cmake "${arguments[@]}"
      - name: Build compiler, SDK and generated-code smoke target
        run: cmake --build --preset plugin --parallel
      - name: Run GDExtension and direct-build tests
        run: ctest --preset plugin
      - name: Remove example project native products
        run: >-
          cmake
          -DGDPP_ADDON_DIRECTORY=${{ github.workspace }}/example/addons/gdpp
          -P cmake/CleanAddonBuild.cmake
      - name: Upload non-release plugin diagnostic bundle
        uses: actions/upload-artifact@v7
        with:
          name: gdpp-plugin-${{ runner.os }}-${{ runner.arch }}
          path: example/addons/gdpp
          if-no-files-found: error
          retention-days: 7
