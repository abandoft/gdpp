name: Android target and export

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GDPP_ANDROID_NDK_VERSION: 28.1.13356709

jobs:
  target-sdk:
    name: Android SDK / Godot ${{ matrix.godot }} / arm64
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        godot: [4.4, 4.5, 4.6, 4.7]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
      - name: Install pinned NDK
        shell: bash
        run: sdkmanager "ndk;$GDPP_ANDROID_NDK_VERSION"
      - name: Configure target SDK builder
        shell: bash
        run: >-
          cmake --preset dev
          -DGDPP_ANDROID_NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$GDPP_ANDROID_NDK_VERSION"
          -DGDPP_ANDROID_SDK_VERSIONS=${{ matrix.godot }}
          -DGDPP_ANDROID_ARCHITECTURES=arm64
      - name: Build Android Release target SDK
        run: cmake --build --preset dev --target gdpp_android_sdk --parallel
      - name: Validate target SDK contract
        shell: bash
        run: |
          set -euo pipefail
          sdk="example/addons/gdpp/sdk/${{ matrix.godot }}/android/arm64"
          grep -q '^platform android$' "$sdk/sdk.manifest"
          grep -q '^arch arm64$' "$sdk/sdk.manifest"
          grep -q '^profiles debug,release$' "$sdk/sdk.manifest"
          grep -q '^distribution_binding template_release$' "$sdk/sdk.manifest"
          grep -q '^distribution_optimization Release$' "$sdk/sdk.manifest"
          grep -q '^android_api_level 28$' "$sdk/sdk.manifest"
          test "$(find "$sdk/lib" -maxdepth 1 -type f -name '*template_debug*.a' | wc -l)" -eq 0
          test "$(find "$sdk/lib" -maxdepth 1 -type f -name '*template_release*.a' | wc -l)" -eq 1
          test "$(find "$sdk/lib" -maxdepth 1 -type f -name '*.a' | wc -l)" -eq 1
      - name: Upload target SDK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gdpp-android-arm64-godot-${{ matrix.godot }}
          path: example/addons/gdpp/sdk/${{ matrix.godot }}/android/arm64
          if-no-files-found: error
          retention-days: 7

  apk:
    name: Android APK / Godot 4.5.2 / arm64
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
      - id: godot
        uses: ./.github/actions/setup-godot
        with:
          version: 4.5.2
          templates: android
      - name: Install pinned Android toolchain
        shell: bash
        run: >-
          sdkmanager
          "ndk;$GDPP_ANDROID_NDK_VERSION"
          "platforms;android-35"
          "build-tools;35.0.0"
      - name: Isolate Godot Android settings
        shell: bash
        run: |
          mkdir -p "$HOME/.config/godot"
          printf '%s\n' \
            '[gd_resource type="EditorSettings" format=3]' \
            '' \
            '[resource]' \
            "export/android/java_sdk_path = \"$JAVA_HOME\"" \
            "export/android/android_sdk_path = \"$ANDROID_SDK_ROOT\"" \
            > "$HOME/.config/godot/editor_settings-4.5.tres"
      - name: Build compiler plugin and Android target SDK
        shell: bash
        env:
          GODOT: ${{ steps.godot.outputs.executable }}
        run: |
          cmake --preset plugin \
            -DGDPP_GODOT_EXECUTABLE="$GODOT" \
            -DGDPP_PACKAGE_GODOT_VERSIONS=4.5 \
            -DGDPP_ANDROID_NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$GDPP_ANDROID_NDK_VERSION" \
            -DGDPP_ANDROID_SDK_VERSIONS=4.5 \
            -DGDPP_ANDROID_ARCHITECTURES=arm64
          cmake --build --preset plugin --parallel
          cmake --build --preset plugin --target gdpp_android_sdk --parallel
      - name: Export and audit binary-only APK
        shell: bash
        env:
          GODOT: ${{ steps.godot.outputs.executable }}
        run: |
          set -euo pipefail
          root="$GITHUB_WORKSPACE/example/addons/gdpp/build/android"
          mkdir -p "$root/audit"
          "$GODOT" --headless --editor --path example --quit-after 120 \
            2>&1 | tee "$root/warmup.log"
          "$GODOT" --headless --editor --path example --import \
            2>&1 | tee "$root/import.log"
          python3 tools/verify_export_immutability.py snapshot \
            --project example --state "$root/extension-state.json"
          "$GODOT" --headless --editor --path example \
            --export-release 'Android arm64' "$root/GDPPExample.apk" \
            2>&1 | tee "$root/export.log"
          python3 tools/verify_export_immutability.py verify \
            --project example --state "$root/extension-state.json"
          apk="$root/GDPPExample.apk"
          test -f "$apk"
          unzip -Z1 "$apk" | LC_ALL=C sort > "$root/contents.txt"
          project_library="$(awk '/^lib\/arm64-v8a\/libgdpp\.release\.android\.arm64\.so$/{print}' "$root/contents.txt")"
          test "$(printf '%s\n' "$project_library" | sed '/^$/d' | wc -l)" -eq 1
          if grep -E -q '\.(gd|gdc)$|/(sdk|godot-cpp)/|libgdpp_compiler' "$root/contents.txt"; then
            echo 'Android package contains GDScript or compiler-only payload.'
            exit 1
          fi
          unzip -j "$apk" "$project_library" -d "$root/audit" >/dev/null
          project_so="$root/audit/$(basename "$project_library")"
          llvm_bin="$ANDROID_SDK_ROOT/ndk/$GDPP_ANDROID_NDK_VERSION/toolchains/llvm/prebuilt/linux-x86_64/bin"
          test "$("$llvm_bin/llvm-nm" -D --defined-only "$project_so" | awk 'NF {print $NF}' | wc -l)" -eq 1
          "$llvm_bin/llvm-nm" -D --defined-only "$project_so" | awk 'NF {print $NF}' | \
            grep -qx gdpp_project_library_init
          if "$llvm_bin/llvm-readelf" -S "$project_so" | grep '\.symtab' >/dev/null; then
            echo 'Android Release project library contains a normal symbol table.'
            exit 1
          fi
          if grep -E -q '(^| )ERROR:|SCRIPT ERROR:|WARNING:|Unable to open' \
              "$root/import.log" "$root/export.log"; then
            echo 'Godot reported an Android import/export diagnostic.'
            exit 1
          fi
          grep -q 'GDPP_AOT_SUMMARY scenes=' "$root/export.log"
      - name: Upload APK evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gdpp-android-apk-godot-4.5.2
          path: example/addons/gdpp/build/android
          if-no-files-found: warn
          retention-days: 14
