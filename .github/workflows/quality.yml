name: Quality gates

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source:
    name: Quality / Source and repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check formatting of changed C++ files
        shell: bash
        env:
          EVENT_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          base="$EVENT_BASE"
          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}"; then
            base="$(git rev-parse HEAD^ 2>/dev/null || true)"
          fi
          if [[ -z "$base" ]]; then
            echo 'No parent commit is available; skipping the incremental format check.'
            exit 0
          fi
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$base" "$GITHUB_SHA" -- \
            include src test | grep -E '\.(cpp|hpp)$' || true)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo 'No changed C++ files.'
            exit 0
          fi
          clang-format --dry-run --Werror "${files[@]}"
      - name: Validate workflow YAML and ownership boundaries
        shell: bash
        run: |
          ruby -e 'require "yaml"; Dir[".github/workflows/*.yml"].sort.each { |path| workflow = YAML.load_file(path); actual = workflow.fetch("permissions").fetch("contents"); raise "#{path}: top-level contents must be read, got #{actual}" unless actual == "read"; if path.end_with?("/release.yml"); publish = workflow.fetch("jobs").fetch("publish").fetch("permissions").fetch("contents"); raise "#{path}: publish job contents must be write, got #{publish}" unless publish == "write"; end; puts path }'
          test ! -e .github/workflows/ci.yml
      - name: Validate module layout and dependency direction
        run: python3 tools/check_architecture.py
      - name: Validate GitHub Actions semantics
        shell: bash
        run: |
          mkdir -p build/tools/go-cache build/tools/go-mod
          GOCACHE="$PWD/build/tools/go-cache" GOMODCACHE="$PWD/build/tools/go-mod" \
            go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
      - name: Reject generated and platform metadata
        shell: bash
        run: |
          if test -n "$(find . -path './.git' -prune -o \
              \( -name '._*' -o -name '.DS_Store' -o -name '__MACOSX' -o \
                 -name '__pycache__' -o -name '*.pyc' \) -print -quit)"; then
            echo 'Repository contains generated or cross-platform metadata.'
            exit 1
          fi
          if test -n "$(find . -path './.git' -prune -o -path './third' -prune -o \
              -path './build' -prune -o -path './example/addons/gdpp/binary' -prune -o \
              -path './example/addons/gdpp/sdk' -prune -o \
              -type f \( -name '*.o' -o -name '*.obj' -o -name '*.a' -o -name '*.so' \
                         -o -name '*.dylib' -o -name '*.dll' -o -name '*.wasm' \) \
              -print -quit)"; then
            echo 'Native build products exist outside approved output directories.'
            exit 1
          fi
