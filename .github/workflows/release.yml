name: Delivery gate and release

on:
  pull_request:
  workflow_dispatch:
    inputs:
      publish:
        description: Create the GitHub Release after the complete delivery gate passes
        required: true
        type: boolean
        default: false
      release_version:
        description: Release version without a v prefix (for example, 1.7.8)
        required: true
        type: string
        default: 1.7.8

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  preflight:
    name: Gate / Release metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Validate immutable release inputs
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.publish || false }}
          REQUESTED_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.release_version || '' }}
        run: |
          set -euo pipefail
          plugin_version="$(sed -n 's/^version="\([^"]*\)"$/\1/p' \
            example/addons/gdpp/plugin.cfg)"
          test "$plugin_version" = "$(printf '%s' "$plugin_version" | tr -d '[:space:]')"
          [[ "$plugin_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          version="${REQUESTED_VERSION:-$plugin_version}"
          test "$version" = "$plugin_version"
          mkdir -p build/release-preflight
          python3 tools/extract_changelog.py \
            --changelog CHANGELOG.md \
            --version "$version" \
            --output build/release-preflight/notes.md
          test -s build/release-preflight/notes.md
          if [[ "$PUBLISH" == true ]]; then
            test "$GITHUB_REF_NAME" = "$DEFAULT_BRANCH"
            if git ls-remote --exit-code --tags origin "refs/tags/$version" >/dev/null 2>&1; then
              echo "Tag $version already exists; releases are immutable."
              exit 1
            fi
            if gh api "repos/$GITHUB_REPOSITORY/releases/tags/$version" >/dev/null 2>&1; then
              echo "Release $version already exists; releases are immutable."
              exit 1
            fi
          fi

  quality-gate:
    name: Gate / Quality
    needs: preflight
    uses: ./.github/workflows/quality.yml

  core-gate:
    name: Gate / Compiler core
    needs: preflight
    uses: ./.github/workflows/core.yml

  native-gate:
    name: Gate / Native integration
    needs: preflight
    uses: ./.github/workflows/native-integration.yml

  godot-gate:
    name: Gate / Godot compatibility
    needs: preflight
    uses: ./.github/workflows/godot-compatibility.yml
    with:
      target: all

  android-gate:
    name: Gate / Android
    needs: preflight
    uses: ./.github/workflows/android.yml

  web-gate:
    name: Gate / Web
    needs: preflight
    uses: ./.github/workflows/web.yml

  ios-gate:
    name: Gate / iOS
    needs: preflight
    uses: ./.github/workflows/ios.yml

  host-components:
    name: Build / Desktop host components
    needs: preflight
    uses: ./.github/workflows/host-components.yml

  packages:
    name: Assemble / Release packages
    needs:
      - quality-gate
      - core-gate
      - native-gate
      - godot-gate
      - android-gate
      - web-gate
      - ios-gate
      - host-components
    uses: ./.github/workflows/package-release.yml

  package-smoke:
    name: Gate / Installed macOS and Windows packages
    needs: packages
    uses: ./.github/workflows/release-package-smoke.yml

  readiness:
    name: Release readiness / All gates passed
    if: always()
    needs:
      - quality-gate
      - core-gate
      - native-gate
      - godot-gate
      - android-gate
      - web-gate
      - ios-gate
      - host-components
      - packages
      - package-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Enforce the complete delivery gate
        shell: bash
        env:
          QUALITY: ${{ needs.quality-gate.result }}
          CORE: ${{ needs.core-gate.result }}
          NATIVE: ${{ needs.native-gate.result }}
          GODOT: ${{ needs.godot-gate.result }}
          ANDROID: ${{ needs.android-gate.result }}
          WEB: ${{ needs.web-gate.result }}
          IOS: ${{ needs.ios-gate.result }}
          HOST_COMPONENTS: ${{ needs.host-components.result }}
          PACKAGES: ${{ needs.packages.result }}
          PACKAGE_SMOKE: ${{ needs.package-smoke.result }}
        run: |
          set -euo pipefail
          for result in \
            "$QUALITY" "$CORE" "$NATIVE" "$GODOT" "$ANDROID" "$WEB" "$IOS" \
            "$HOST_COMPONENTS" "$PACKAGES" "$PACKAGE_SMOKE"; do
            test "$result" = success
          done
          printf '### Complete delivery gate passed\n\nAll tests, 3 packages, and installed macOS/Windows package smokes passed.\n' \
            >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish / GitHub Release
    if: github.event_name == 'workflow_dispatch' && inputs.publish && needs.readiness.result == 'success'
    needs: readiness
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: gdpp-release-*
          path: build/release
          merge-multiple: true
      - name: Validate the unprefixed version and three-archive matrix
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          plugin_version="$(sed -n 's/^version="\([^"]*\)"$/\1/p' \
            example/addons/gdpp/plugin.cfg)"
          test "$RELEASE_VERSION" = "$plugin_version"
          git fetch --no-tags origin "refs/heads/$DEFAULT_BRANCH"
          test "$(git rev-parse HEAD)" = "$(git rev-parse FETCH_HEAD)"
          if git ls-remote --exit-code --tags origin \
              "refs/tags/$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "Tag $RELEASE_VERSION appeared while the release was running."
            exit 1
          fi
          if gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_VERSION" \
              >/dev/null 2>&1; then
            echo "Release $RELEASE_VERSION appeared while the release was running."
            exit 1
          fi
          for archive in gdpp-mac.zip gdpp-linux.zip gdpp-win.zip; do
            test -f "build/release/$archive"
          done
          test "$(find build/release -maxdepth 1 -type f -name '*.zip' | wc -l)" -eq 3
      - name: Read release notes from CHANGELOG.md
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: >-
          python3 tools/extract_changelog.py
          --changelog CHANGELOG.md
          --version "$RELEASE_VERSION"
          --output build/release-notes.md
      - name: Create checksums
        working-directory: build/release
        run: LC_ALL=C sha256sum -- gdpp-linux.zip gdpp-mac.zip gdpp-win.zip > SHA256SUMS
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ inputs.release_version }}
          name: ${{ inputs.release_version }}
          body_path: build/release-notes.md
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: |
            build/release/gdpp-mac.zip
            build/release/gdpp-linux.zip
            build/release/gdpp-win.zip
            build/release/SHA256SUMS
      - name: Verify the published release contract
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          release="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_VERSION")"
          test "$(jq -r '.tag_name' <<< "$release")" = "$RELEASE_VERSION"
          test "$(jq -r '.name' <<< "$release")" = "$RELEASE_VERSION"
          test "$(jq -r '.draft' <<< "$release")" = false
          test "$(jq -r '.prerelease' <<< "$release")" = false
          test "$(jq '[.assets[] | select(.state == "uploaded" and .size > 0)] | length' \
            <<< "$release")" -eq 4
          test "$(jq '.assets | length' <<< "$release")" -eq 4
          test "$(jq '[.assets[] | select(.name | endswith(".zip"))] | length' \
            <<< "$release")" -eq 3
          for name in gdpp-mac.zip gdpp-linux.zip gdpp-win.zip SHA256SUMS; do
            test "$(jq --arg name "$name" \
              '[.assets[] | select(.name == $name)] | length' <<< "$release")" -eq 1
          done
          test "$(git ls-remote origin "refs/tags/$RELEASE_VERSION" | awk '{print $1}')" \
            = "$GITHUB_SHA"
          printf 'Published %s: %s\n' "$RELEASE_VERSION" \
            "$(jq -r '.html_url' <<< "$release")" >> "$GITHUB_STEP_SUMMARY"
