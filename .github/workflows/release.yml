name: Delivery gate and release

on:
  pull_request:
  workflow_dispatch:
    inputs:
      publish:
        description: Create the GitHub Release after the complete delivery gate passes
        required: true
        type: boolean
        default: false
      release_version:
        description: Release version without a v prefix (for example, 1.7.7)
        required: true
        type: string
        default: 1.7.7

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GDPP_COMPILER_GODOT_API: 4.4

jobs:
  preflight:
    name: Gate / Release metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Validate immutable release inputs
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.publish || false }}
          REQUESTED_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.release_version || '' }}
        run: |
          set -euo pipefail
          plugin_version="$(sed -n 's/^version="\([^"]*\)"$/\1/p' \
            example/addons/gdpp/plugin.cfg)"
          test "$plugin_version" = "$(printf '%s' "$plugin_version" | tr -d '[:space:]')"
          [[ "$plugin_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          version="${REQUESTED_VERSION:-$plugin_version}"
          test "$version" = "$plugin_version"
          mkdir -p build/release-preflight
          python3 tools/extract_changelog.py \
            --changelog CHANGELOG.md \
            --version "$version" \
            --output build/release-preflight/notes.md
          test -s build/release-preflight/notes.md
          if [[ "$PUBLISH" == true ]]; then
            test "$GITHUB_REF_NAME" = "$DEFAULT_BRANCH"
            if git ls-remote --exit-code --tags origin "refs/tags/$version" >/dev/null 2>&1; then
              echo "Tag $version already exists; releases are immutable."
              exit 1
            fi
            if gh api "repos/$GITHUB_REPOSITORY/releases/tags/$version" >/dev/null 2>&1; then
              echo "Release $version already exists; releases are immutable."
              exit 1
            fi
          fi

  quality-gate:
    name: Gate / Quality
    needs: preflight
    uses: ./.github/workflows/quality.yml

  core-gate:
    name: Gate / Compiler core
    needs: preflight
    uses: ./.github/workflows/core.yml

  native-gate:
    name: Gate / Native integration
    needs: preflight
    uses: ./.github/workflows/native-integration.yml

  godot-gate:
    name: Gate / Godot compatibility
    needs: preflight
    uses: ./.github/workflows/godot-compatibility.yml
    with:
      target: all

  android-gate:
    name: Gate / Android
    needs: preflight
    uses: ./.github/workflows/android.yml

  web-gate:
    name: Gate / Web
    needs: preflight
    uses: ./.github/workflows/web.yml

  ios-gate:
    name: Gate / iOS
    needs: preflight
    uses: ./.github/workflows/ios.yml

  host-components:
    name: Host / ${{ matrix.host }} / Godot 4.4-4.7 SDKs
    needs: [quality-gate, core-gate, native-gate, godot-gate, android-gate, web-gate, ios-gate]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: mac-arm64
            os: macos-15
            sdk_platform: macos
            sdk_arch: arm64
            platform_minimum: macOS_11.0
          - host: linux-x64
            os: ubuntu-22.04
            sdk_platform: linux
            sdk_arch: x86_64
            platform_minimum: Ubuntu_22.04
          - host: windows-x64
            os: windows-2025
            sdk_platform: windows
            sdk_arch: x86_64
            platform_minimum: Windows_10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
      - name: Initialize the MSVC x64 toolchain
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64
      - name: Configure the cross-version commercial host component
        shell: bash
        run: |
          set -euo pipefail
          arguments=(
            --preset release
            "-DGDPP_GODOT_API_VERSION=$GDPP_COMPILER_GODOT_API"
            "-DGDPP_PACKAGE_GODOT_VERSIONS=4.4;4.5;4.6;4.7"
          )
          if [[ "${{ matrix.host }}" == mac-arm64 ]]; then
            test "$(uname -m)" = arm64
            arguments+=("-DCMAKE_OSX_ARCHITECTURES=arm64")
          elif [[ "${{ matrix.host }}" == windows-x64 ]]; then
            arguments+=("-DCMAKE_CXX_COMPILER=cl.exe")
          fi
          cmake "${arguments[@]}"
      - name: Build compiler and all host SDKs
        run: cmake --build --preset release --parallel
      - name: Run release tests
        run: ctest --preset release
      - name: Validate all host SDK and compiler ABI contracts
        shell: bash
        run: |
          set -euo pipefail
          package=example/addons/gdpp
          version="$(sed -n 's/^version="\([^"]*\)"$/\1/p' "$package/plugin.cfg")"
          test -n "$version"
          test "$(find "$package/sdk" -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq 4
          for godot in 4.4 4.5 4.6 4.7; do
            sdk="$package/sdk/$godot"
            grep -q "^api $godot$" "$sdk/sdk.manifest"
            grep -q '^platform ${{ matrix.sdk_platform }}$' "$sdk/sdk.manifest"
            grep -q '^arch ${{ matrix.sdk_arch }}$' "$sdk/sdk.manifest"
            grep -q '^profiles debug,release$' "$sdk/sdk.manifest"
            grep -q '^distribution_binding template_release$' "$sdk/sdk.manifest"
            grep -q '^distribution_optimization Release$' "$sdk/sdk.manifest"
            grep -q '^platform_minimum ${{ matrix.platform_minimum }}$' "$sdk/sdk.manifest"
            grep -q "^gdpp_version $version$" "$sdk/sdk.manifest"
            test "$(find "$sdk/lib" -maxdepth 1 -type f | wc -l)" -eq 1
            test "$(find "$sdk/lib" -maxdepth 1 -type f -name '*template_release*' | wc -l)" -eq 1
          done
          grep -q '^compatibility_minimum = "4.4"$' "$package/gdpp.gdextension"
      - name: Validate macOS arm64 and 11.0 minimum
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          for binary in \
            example/addons/gdpp/binary/libgdpp_compiler.macos.arm64.dylib \
            example/addons/gdpp/binary/libgdpp_fallback.macos.arm64.dylib; do
            test "$(lipo -archs "$binary")" = arm64
            otool -arch arm64 -l "$binary" | grep -A3 LC_BUILD_VERSION \
              | grep -q 'minos 11.0'
          done
      - name: Validate Ubuntu 22.04 glibc minimum
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          test "$(. /etc/os-release && printf '%s' "$VERSION_ID")" = 22.04
          maximum_glibc="$(
            find example/addons/gdpp/binary -type f -name '*.so' \
              -exec readelf --version-info {} + \
              | grep -Eo 'GLIBC_[0-9]+\.[0-9]+' \
              | sed 's/^GLIBC_//' \
              | sort -Vu \
              | tail -n 1
          )"
          test -n "$maximum_glibc"
          if [[ "$(printf '%s\n%s\n' 2.35 "$maximum_glibc" | sort -Vu | tail -n 1)" \
              != 2.35 ]]; then
            echo "Linux package requires GLIBC_$maximum_glibc, newer than GLIBC_2.35."
            exit 1
          fi
      - name: Remove project products and stage the host component
        shell: bash
        run: |
          set -euo pipefail
          cmake \
            -DGDPP_ADDON_DIRECTORY="$GITHUB_WORKSPACE/example/addons/gdpp" \
            -P cmake/CleanAddonBuild.cmake
          destination=build/host-component/addons/gdpp
          python3 tools/stage_host_component.py \
            --source example/addons/gdpp \
            --destination "$destination" \
            --host '${{ matrix.host }}'
          test ! -e "$destination/build"
          test "$(find "$destination/binary" -maxdepth 1 -type f | wc -l)" -eq 2
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gdpp-host-${{ matrix.host }}
          path: build/host-component
          if-no-files-found: error
          retention-days: 7

  packages:
    name: ZIP / ${{ matrix.package_host }} / Godot 4.4-4.7
    needs: [host-components, android-gate, web-gate, ios-gate]
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_host: mac
            component_host: mac-arm64
            archive: gdpp-mac.zip
          - package_host: linux
            component_host: linux-x64
            archive: gdpp-linux.zip
          - package_host: win
            component_host: windows-x64
            archive: gdpp-win.zip
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: gdpp-host-${{ matrix.component_host }}
          path: build/components/gdpp-host-${{ matrix.component_host }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: gdpp-android-arm64-godot-*
          path: build/components
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: gdpp-web-godot-*
          path: build/components
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        if: matrix.package_host == 'mac'
        with:
          pattern: gdpp-ios-godot-*
          path: build/components
      - name: Assemble the cross-version desktop plugin ZIP
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/package_platform_release.py \
            --components build/components \
            --output build/release \
            --host ${{ matrix.package_host }}
      - name: Audit the platform and SDK matrix
        shell: bash
        run: |
          set -euo pipefail
          archive="build/release/${{ matrix.archive }}"
          test -f "$archive"
          unzip -Z1 "$archive" > build/archive-contents.txt
          contents=build/archive-contents.txt
          grep -q '^addons/gdpp/build_progress.gd$' "$contents"
          grep -q '^addons/gdpp/native_build_job.gd$' "$contents"
          grep -q '^addons/gdpp/PACKAGE_MANIFEST.txt$' "$contents"
          test "$(grep -Ec '^addons/gdpp/binary/[^/]+$' "$contents")" -eq 2
          for godot in 4.4 4.5 4.6 4.7; do
            grep -q "^addons/gdpp/sdk/$godot/sdk.manifest$" "$contents"
            grep -q "^addons/gdpp/sdk/$godot/android/arm64/sdk.manifest$" "$contents"
            grep -q "^addons/gdpp/sdk/$godot/web/wasm32/nothreads/sdk.manifest$" "$contents"
            grep -q "^addons/gdpp/sdk/$godot/web/wasm32/threads/sdk.manifest$" "$contents"
            if [[ "${{ matrix.package_host }}" == mac ]]; then
              grep -q "^addons/gdpp/sdk/$godot/ios/arm64/sdk.manifest$" "$contents"
            elif grep -q "^addons/gdpp/sdk/$godot/ios/" "$contents"; then
              echo 'A non-macOS package contains an iOS SDK.'
              exit 1
            fi
          done
          test "$(grep -Eo '^addons/gdpp/sdk/(4\.4|4\.5|4\.6|4\.7)/' "$contents" \
            | sort -u | wc -l)" -eq 4
          if grep -Eq \
              'template_debug|\.editor\.|\.zip$|/build/|gdpp_project|\.DS_Store$|/\._' \
              "$contents"; then
            echo 'Release ZIP contains a forbidden binding or generated product.'
            exit 1
          fi
          if grep -Eq '^addons/gdpp/sdk/(4\.4|4\.5|4\.6|4\.7)/(macos|linux|windows)/' \
              "$contents"; then
            echo 'Release ZIP contains another desktop host SDK.'
            exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gdpp-release-${{ matrix.package_host }}
          path: build/release/${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 14

  readiness:
    name: Release readiness / All gates passed
    if: always()
    needs:
      - quality-gate
      - core-gate
      - native-gate
      - godot-gate
      - android-gate
      - web-gate
      - ios-gate
      - host-components
      - packages
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Enforce the complete delivery gate
        shell: bash
        env:
          QUALITY: ${{ needs.quality-gate.result }}
          CORE: ${{ needs.core-gate.result }}
          NATIVE: ${{ needs.native-gate.result }}
          GODOT: ${{ needs.godot-gate.result }}
          ANDROID: ${{ needs.android-gate.result }}
          WEB: ${{ needs.web-gate.result }}
          IOS: ${{ needs.ios-gate.result }}
          HOST_COMPONENTS: ${{ needs.host-components.result }}
          PACKAGES: ${{ needs.packages.result }}
        run: |
          set -euo pipefail
          for result in \
            "$QUALITY" "$CORE" "$NATIVE" "$GODOT" "$ANDROID" "$WEB" "$IOS" \
            "$HOST_COMPONENTS" "$PACKAGES"; do
            test "$result" = success
          done
          printf '### Complete delivery gate passed\n\nAll tests and 3 packages passed.\n' \
            >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish / GitHub Release
    if: github.event_name == 'workflow_dispatch' && inputs.publish && needs.readiness.result == 'success'
    needs: readiness
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: gdpp-release-*
          path: build/release
          merge-multiple: true
      - name: Validate the unprefixed version and three-archive matrix
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          plugin_version="$(sed -n 's/^version="\([^"]*\)"$/\1/p' \
            example/addons/gdpp/plugin.cfg)"
          test "$RELEASE_VERSION" = "$plugin_version"
          git fetch --no-tags origin "refs/heads/$DEFAULT_BRANCH"
          test "$(git rev-parse HEAD)" = "$(git rev-parse FETCH_HEAD)"
          if git ls-remote --exit-code --tags origin \
              "refs/tags/$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "Tag $RELEASE_VERSION appeared while the release was running."
            exit 1
          fi
          if gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_VERSION" \
              >/dev/null 2>&1; then
            echo "Release $RELEASE_VERSION appeared while the release was running."
            exit 1
          fi
          for archive in gdpp-mac.zip gdpp-linux.zip gdpp-win.zip; do
            test -f "build/release/$archive"
          done
          test "$(find build/release -maxdepth 1 -type f -name '*.zip' | wc -l)" -eq 3
      - name: Read release notes from CHANGELOG.md
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: >-
          python3 tools/extract_changelog.py
          --changelog CHANGELOG.md
          --version "$RELEASE_VERSION"
          --output build/release-notes.md
      - name: Create checksums
        working-directory: build/release
        run: LC_ALL=C sha256sum -- gdpp-linux.zip gdpp-mac.zip gdpp-win.zip > SHA256SUMS
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ inputs.release_version }}
          name: ${{ inputs.release_version }}
          body_path: build/release-notes.md
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: |
            build/release/gdpp-mac.zip
            build/release/gdpp-linux.zip
            build/release/gdpp-win.zip
            build/release/SHA256SUMS
      - name: Verify the published release contract
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          release="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_VERSION")"
          test "$(jq -r '.tag_name' <<< "$release")" = "$RELEASE_VERSION"
          test "$(jq -r '.name' <<< "$release")" = "$RELEASE_VERSION"
          test "$(jq -r '.draft' <<< "$release")" = false
          test "$(jq -r '.prerelease' <<< "$release")" = false
          test "$(jq '[.assets[] | select(.state == "uploaded" and .size > 0)] | length' \
            <<< "$release")" -eq 4
          test "$(jq '.assets | length' <<< "$release")" -eq 4
          test "$(jq '[.assets[] | select(.name | endswith(".zip"))] | length' \
            <<< "$release")" -eq 3
          for name in gdpp-mac.zip gdpp-linux.zip gdpp-win.zip SHA256SUMS; do
            test "$(jq --arg name "$name" \
              '[.assets[] | select(.name == $name)] | length' <<< "$release")" -eq 1
          done
          test "$(git ls-remote origin "refs/tags/$RELEASE_VERSION" | awk '{print $1}')" \
            = "$GITHUB_SHA"
          printf 'Published %s: %s\n' "$RELEASE_VERSION" \
            "$(jq -r '.html_url' <<< "$release")" >> "$GITHUB_STEP_SUMMARY"
