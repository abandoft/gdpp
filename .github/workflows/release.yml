name: Delivery gate and release

on:
  pull_request:
  workflow_dispatch:
    inputs:
      publish:
        description: Create the GitHub Release after the complete delivery gate passes
        required: true
        type: boolean
        default: false
      release_version:
        description: Release version without a v prefix (for example, 1.7.0)
        required: true
        type: string
        default: 1.7.0

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GDPP_COMPILER_GODOT_API: 4.4

jobs:
  preflight:
    name: Gate / Release metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Validate immutable release inputs
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.publish || false }}
          REQUESTED_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.release_version || '' }}
        run: |
          set -euo pipefail
          plugin_version="$(sed -n 's/^version="\([^"]*\)"$/\1/p' \
            example/addons/gdpp/plugin.cfg)"
          test "$plugin_version" = "$(printf '%s' "$plugin_version" | tr -d '[:space:]')"
          [[ "$plugin_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          version="${REQUESTED_VERSION:-$plugin_version}"
          test "$version" = "$plugin_version"
          mkdir -p build/release-preflight
          python3 tools/extract_changelog.py \
            --changelog CHANGELOG.md \
            --version "$version" \
            --output build/release-preflight/notes.md
          test -s build/release-preflight/notes.md
          if [[ "$PUBLISH" == true ]]; then
            test "$GITHUB_REF_NAME" = "$DEFAULT_BRANCH"
            if git ls-remote --exit-code --tags origin "refs/tags/$version" >/dev/null 2>&1; then
              echo "Tag $version already exists; releases are immutable."
              exit 1
            fi
            if gh api "repos/$GITHUB_REPOSITORY/releases/tags/$version" >/dev/null 2>&1; then
              echo "Release $version already exists; releases are immutable."
              exit 1
            fi
          fi

  quality-gate:
    name: Gate / Quality
    needs: preflight
    uses: ./.github/workflows/quality.yml

  core-gate:
    name: Gate / Compiler core
    needs: preflight
    uses: ./.github/workflows/core.yml

  native-gate:
    name: Gate / Native integration
    needs: preflight
    uses: ./.github/workflows/native-integration.yml

  godot-gate:
    name: Gate / Godot compatibility
    needs: preflight
    uses: ./.github/workflows/godot-compatibility.yml
    with:
      target: all

  android-gate:
    name: Gate / Android
    needs: preflight
    uses: ./.github/workflows/android.yml

  web-gate:
    name: Gate / Web
    needs: preflight
    uses: ./.github/workflows/web.yml

  ios-gate:
    name: Gate / iOS
    needs: preflight
    uses: ./.github/workflows/ios.yml

  host-components:
    name: Host / ${{ matrix.host }} / Godot ${{ matrix.godot }} SDK
    needs: [quality-gate, core-gate, native-gate, godot-gate, android-gate, web-gate, ios-gate]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        godot: [4.4, 4.5, 4.6, 4.7]
        host: [mac-arm64, linux-x64, windows-x64]
        include:
          - host: mac-arm64
            os: macos-15
            sdk_platform: macos
            sdk_arch: arm64
            platform_minimum: macOS_11.0
          - host: linux-x64
            os: ubuntu-22.04
            sdk_platform: linux
            sdk_arch: x86_64
            platform_minimum: Ubuntu_22.04
          - host: windows-x64
            os: windows-2025
            sdk_platform: windows
            sdk_arch: x86_64
            platform_minimum: Windows_10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
      - name: Initialize the MSVC x64 toolchain
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64
      - name: Configure one-version commercial host component
        shell: bash
        run: |
          set -euo pipefail
          arguments=(
            --preset release
            "-DGDPP_GODOT_API_VERSION=$GDPP_COMPILER_GODOT_API"
            "-DGDPP_PACKAGE_GODOT_VERSIONS=${{ matrix.godot }}"
          )
          if [[ "${{ matrix.host }}" == mac-arm64 ]]; then
            test "$(uname -m)" = arm64
            arguments+=("-DCMAKE_OSX_ARCHITECTURES=arm64")
          elif [[ "${{ matrix.host }}" == windows-x64 ]]; then
            arguments+=("-DCMAKE_CXX_COMPILER=cl.exe")
          fi
          cmake "${arguments[@]}"
      - name: Build compiler and selected host SDK
        run: cmake --build --preset release --parallel
      - name: Run release tests
        run: ctest --preset release
      - name: Validate host SDK and compiler ABI contract
        shell: bash
        run: |
          set -euo pipefail
          package=example/addons/gdpp
          sdk="$package/sdk/${{ matrix.godot }}"
          grep -q '^api ${{ matrix.godot }}$' "$sdk/sdk.manifest"
          grep -q '^platform ${{ matrix.sdk_platform }}$' "$sdk/sdk.manifest"
          grep -q '^arch ${{ matrix.sdk_arch }}$' "$sdk/sdk.manifest"
          grep -q '^profiles debug,release$' "$sdk/sdk.manifest"
          grep -q '^distribution_binding template_release$' "$sdk/sdk.manifest"
          grep -q '^distribution_optimization Release$' "$sdk/sdk.manifest"
          grep -q '^platform_minimum ${{ matrix.platform_minimum }}$' "$sdk/sdk.manifest"
          version="$(sed -n 's/^version="\([^"]*\)"$/\1/p' "$package/plugin.cfg")"
          test -n "$version"
          grep -q "^gdpp_version $version$" "$sdk/sdk.manifest"
          test "$(find "$package/sdk" -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq 1
          test "$(find "$sdk/lib" -maxdepth 1 -type f -name '*editor*' | wc -l)" -eq 0
          test "$(find "$sdk/lib" -maxdepth 1 -type f -name '*template_debug*' | wc -l)" -eq 0
          test "$(find "$sdk/lib" -maxdepth 1 -type f -name '*template_release*' | wc -l)" -eq 1
          grep -q '^compatibility_minimum = "4.4"$' "$package/gdpp.gdextension"
      - name: Validate macOS arm64 and 11.0 minimum
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          for binary in \
            example/addons/gdpp/binary/libgdpp_compiler.macos.arm64.dylib \
            example/addons/gdpp/binary/libgdpp_fallback.macos.arm64.dylib; do
            test "$(lipo -archs "$binary")" = arm64
            otool -arch arm64 -l "$binary" | grep -A3 LC_BUILD_VERSION \
              | grep -q 'minos 11.0'
          done
      - name: Validate Ubuntu 22.04 glibc minimum
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          test "$(. /etc/os-release && printf '%s' "$VERSION_ID")" = 22.04
          maximum_glibc="$(
            find example/addons/gdpp/binary -type f -name '*.so' \
              -exec readelf --version-info {} + \
              | grep -Eo 'GLIBC_[0-9]+\.[0-9]+' \
              | sed 's/^GLIBC_//' \
              | sort -Vu \
              | tail -n 1
          )"
          test -n "$maximum_glibc"
          if [[ "$(printf '%s\n%s\n' 2.35 "$maximum_glibc" | sort -Vu | tail -n 1)" \
              != 2.35 ]]; then
            echo "Linux package requires GLIBC_$maximum_glibc, newer than GLIBC_2.35."
            exit 1
          fi
          echo "Maximum required GLIBC version: $maximum_glibc"
      - name: Remove project products and stage host component
        shell: bash
        run: |
          set -euo pipefail
          cmake \
            -DGDPP_ADDON_DIRECTORY="$GITHUB_WORKSPACE/example/addons/gdpp" \
            -P cmake/CleanAddonBuild.cmake
          destination=build/host-component/addons/gdpp
          cmake -E make_directory "$destination"
          cmake -E copy_directory example/addons/gdpp "$destination"
          test ! -e "$destination/build"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gdpp-host-${{ matrix.host }}-godot-${{ matrix.godot }}
          path: build/host-component
          if-no-files-found: error
          retention-days: 7

  android-components:
    name: Target / Android arm64 / Godot ${{ matrix.godot }}
    needs: [quality-gate, core-gate, native-gate, godot-gate, android-gate, web-gate, ios-gate]
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        godot: [4.4, 4.5, 4.6, 4.7]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
      - name: Install pinned Android NDK
        run: sdkmanager "ndk;28.1.13356709"
      - name: Build Android 9 arm64 target component
        shell: bash
        run: |
          set -euo pipefail
          cmake --preset dev \
            -DGDPP_ANDROID_NDK_ROOT="$ANDROID_SDK_ROOT/ndk/28.1.13356709" \
            -DGDPP_ANDROID_SDK_VERSIONS=${{ matrix.godot }} \
            -DGDPP_ANDROID_ARCHITECTURES=arm64
          cmake --build --preset dev --target gdpp_android_sdk --parallel
          sdk="example/addons/gdpp/sdk/${{ matrix.godot }}/android/arm64"
          grep -q '^platform_minimum Android_9$' "$sdk/sdk.manifest"
          grep -q '^android_api_level 28$' "$sdk/sdk.manifest"
          destination="build/android-component/addons/gdpp/sdk/${{ matrix.godot }}/android"
          mkdir -p "$destination"
          cp -R "$sdk" "$destination/"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gdpp-target-android-arm64-godot-${{ matrix.godot }}
          path: build/android-component
          if-no-files-found: error
          retention-days: 7

  ios-components:
    name: Target / iOS arm64 / Godot ${{ matrix.godot }}
    needs: [quality-gate, core-gate, native-gate, godot-gate, android-gate, web-gate, ios-gate]
    runs-on: macos-15
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        godot: [4.4, 4.5, 4.6, 4.7]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
      - name: Build iOS 16 device and Universal Simulator target component
        shell: bash
        run: |
          set -euo pipefail
          test "$(uname -m)" = arm64
          cmake --preset dev -DGDPP_IOS_SDK_VERSIONS=${{ matrix.godot }}
          cmake --build --preset dev --target gdpp_ios_sdk --parallel
          sdk="example/addons/gdpp/sdk/${{ matrix.godot }}/ios/arm64"
          grep -q '^platform_minimum iOS_16.0$' "$sdk/sdk.manifest"
          grep -q '^ios_deployment_target 16.0$' "$sdk/sdk.manifest"
          grep -q '^ios_slices device-arm64,simulator-arm64,simulator-x86_64$' \
            "$sdk/sdk.manifest"
          destination="build/ios-component/addons/gdpp/sdk/${{ matrix.godot }}/ios"
          mkdir -p "$destination"
          cp -R "$sdk" "$destination/"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gdpp-target-ios-arm64-godot-${{ matrix.godot }}
          path: build/ios-component
          if-no-files-found: error
          retention-days: 7

  packages:
    name: ZIP / ${{ matrix.host }} / Godot ${{ matrix.godot }}
    needs: [host-components, android-components, ios-components]
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        godot: [4.4, 4.5, 4.6, 4.7]
        host: [mac-arm64, linux-x64, windows-x64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: gdpp-host-${{ matrix.host }}-godot-${{ matrix.godot }}
          path: build/components/host
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: gdpp-target-android-arm64-godot-${{ matrix.godot }}
          path: build/components/android
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        if: matrix.host == 'mac-arm64'
        with:
          name: gdpp-target-ios-arm64-godot-${{ matrix.godot }}
          path: build/components/ios
      - name: Merge exact-version mobile target components
        shell: bash
        run: |
          set -euo pipefail
          addon=build/components/host/addons/gdpp
          sdk="$addon/sdk/${{ matrix.godot }}"
          cp -R \
            "build/components/android/addons/gdpp/sdk/${{ matrix.godot }}/android" \
            "$sdk/"
          if [[ "${{ matrix.host }}" == mac-arm64 ]]; then
            cp -R \
              "build/components/ios/addons/gdpp/sdk/${{ matrix.godot }}/ios" \
              "$sdk/"
          fi
      - name: Assemble and audit deterministic plugin ZIP
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/package_release.py \
            --addon build/components/host/addons/gdpp \
            --output build/release \
            --host ${{ matrix.host }} \
            --godot-version ${{ matrix.godot }}
          archive="build/release/gdpp-${{ matrix.godot }}-${{ matrix.host }}.zip"
          test -f "$archive"
          unzip -Z1 "$archive" > build/archive-contents.txt
          grep -q '^addons/gdpp/build_progress.gd$' build/archive-contents.txt
          grep -q '^addons/gdpp/native_build_job.gd$' build/archive-contents.txt
          if grep -q 'template_debug' build/archive-contents.txt; then
            echo 'Release ZIP contains a forbidden template_debug binding.'
            exit 1
          fi
          test "$(grep -Ec '^addons/gdpp/sdk/(4\.4|4\.5|4\.6|4\.7)/sdk\.manifest$' \
            build/archive-contents.txt)" -eq 1
          grep -q '^addons/gdpp/sdk/${{ matrix.godot }}/android/arm64/sdk.manifest$' \
            build/archive-contents.txt
          if [[ "${{ matrix.host }}" == mac-arm64 ]]; then
            grep -q '^addons/gdpp/sdk/${{ matrix.godot }}/ios/arm64/sdk.manifest$' \
              build/archive-contents.txt
          elif grep -q '/ios/' build/archive-contents.txt; then
            echo 'A non-macOS package contains the iOS target component.'
            exit 1
          fi
          if grep -Eq '/web/|/build/|gdpp_project|\.DS_Store$|/\._' build/archive-contents.txt; then
            echo 'Release ZIP contains a forbidden target or generated product.'
            exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gdpp-release-${{ matrix.host }}-godot-${{ matrix.godot }}
          path: build/release/*.zip
          if-no-files-found: error
          retention-days: 14

  complete-packages:
    name: ZIP / Complete / Godot ${{ matrix.godot }}
    needs: [host-components, android-components, ios-components, web-gate]
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        godot: [4.4, 4.5, 4.6, 4.7]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: gdpp-host-*-godot-${{ matrix.godot }}
          path: build/complete-components
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: gdpp-target-android-arm64-godot-${{ matrix.godot }}
          path: build/complete-components/gdpp-target-android-arm64-godot-${{ matrix.godot }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: gdpp-target-ios-arm64-godot-${{ matrix.godot }}
          path: build/complete-components/gdpp-target-ios-arm64-godot-${{ matrix.godot }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: gdpp-web-godot-${{ matrix.godot }}-*
          path: build/complete-components
      - name: Assemble the install-ready complete plugin ZIP
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/package_complete_release.py \
            --components build/complete-components \
            --output build/release \
            --godot-version ${{ matrix.godot }}
      - name: Audit all desktop and export target components
        shell: bash
        run: |
          set -euo pipefail
          archive="build/release/gdpp-${{ matrix.godot }}.zip"
          test -f "$archive"
          unzip -Z1 "$archive" > build/complete-archive-contents.txt
          contents=build/complete-archive-contents.txt
          grep -q '^addons/gdpp/build_progress.gd$' "$contents"
          grep -q '^addons/gdpp/native_build_job.gd$' "$contents"
          grep -q '^addons/gdpp/PACKAGE_MANIFEST.txt$' "$contents"
          for binary in \
            libgdpp_compiler.macos.arm64.dylib \
            libgdpp_fallback.macos.arm64.dylib \
            libgdpp_compiler.linux.x86_64.so \
            libgdpp_fallback.linux.x86_64.so \
            gdpp_compiler.windows.x86_64.dll \
            gdpp_fallback.windows.x86_64.dll; do
            grep -q "^addons/gdpp/binary/$binary$" "$contents"
          done
          test "$(grep -Ec '^addons/gdpp/binary/[^/]+$' "$contents")" -eq 6
          for host_sdk in macos/arm64 linux/x86_64 windows/x86_64; do
            grep -q \
              "^addons/gdpp/sdk/${{ matrix.godot }}/$host_sdk/sdk.manifest$" \
              "$contents"
          done
          for target_sdk in \
            android/arm64 \
            ios/arm64 \
            web/wasm32/nothreads \
            web/wasm32/threads; do
            grep -q \
              "^addons/gdpp/sdk/${{ matrix.godot }}/$target_sdk/sdk.manifest$" \
              "$contents"
          done
          test "$(grep -Ec '^addons/gdpp/sdk/(4\.4|4\.5|4\.6|4\.7)/.*/sdk\.manifest$' \
            "$contents")" -eq 7
          if grep -q "^addons/gdpp/sdk/${{ matrix.godot }}/sdk.manifest$" "$contents"; then
            echo 'Complete package contains an ambiguous root host SDK manifest.'
            exit 1
          fi
          test "$(grep -Eo '^addons/gdpp/sdk/(4\.4|4\.5|4\.6|4\.7)/' "$contents" \
            | sort -u | wc -l)" -eq 1
          if grep -Eq 'template_debug|\.zip$|/build/|gdpp_project|\.DS_Store$|/\._' \
              "$contents"; then
            echo 'Complete package contains a forbidden nested or generated product.'
            exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gdpp-release-complete-godot-${{ matrix.godot }}
          path: build/release/gdpp-${{ matrix.godot }}.zip
          if-no-files-found: error
          retention-days: 14

  readiness:
    name: Release readiness / All gates passed
    if: always()
    needs:
      - quality-gate
      - core-gate
      - native-gate
      - godot-gate
      - android-gate
      - web-gate
      - ios-gate
      - host-components
      - android-components
      - ios-components
      - packages
      - complete-packages
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Enforce the complete delivery gate
        shell: bash
        env:
          QUALITY: ${{ needs.quality-gate.result }}
          CORE: ${{ needs.core-gate.result }}
          NATIVE: ${{ needs.native-gate.result }}
          GODOT: ${{ needs.godot-gate.result }}
          ANDROID: ${{ needs.android-gate.result }}
          WEB: ${{ needs.web-gate.result }}
          IOS: ${{ needs.ios-gate.result }}
          HOST_COMPONENTS: ${{ needs.host-components.result }}
          ANDROID_COMPONENTS: ${{ needs.android-components.result }}
          IOS_COMPONENTS: ${{ needs.ios-components.result }}
          PACKAGES: ${{ needs.packages.result }}
          COMPLETE_PACKAGES: ${{ needs.complete-packages.result }}
        run: |
          set -euo pipefail
          for result in \
            "$QUALITY" "$CORE" "$NATIVE" "$GODOT" "$ANDROID" "$WEB" "$IOS" \
            "$HOST_COMPONENTS" "$ANDROID_COMPONENTS" "$IOS_COMPONENTS" "$PACKAGES" \
            "$COMPLETE_PACKAGES"; do
            test "$result" = success
          done
          printf '### Complete delivery gate passed\n\nAll tests and 16 packages passed.\n' \
            >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish / GitHub Release
    if: github.event_name == 'workflow_dispatch' && inputs.publish && needs.readiness.result == 'success'
    needs: readiness
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: gdpp-release-*
          path: build/release
          merge-multiple: true
      - name: Validate unprefixed version and 16-archive matrix
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          plugin_version="$(sed -n 's/^version="\([^"]*\)"$/\1/p' \
            example/addons/gdpp/plugin.cfg)"
          test "$RELEASE_VERSION" = "$plugin_version"
          git fetch --no-tags origin "refs/heads/$DEFAULT_BRANCH"
          test "$(git rev-parse HEAD)" = "$(git rev-parse FETCH_HEAD)"
          if git ls-remote --exit-code --tags origin \
              "refs/tags/$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "Tag $RELEASE_VERSION appeared while the release was running."
            exit 1
          fi
          if gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_VERSION" \
              >/dev/null 2>&1; then
            echo "Release $RELEASE_VERSION appeared while the release was running."
            exit 1
          fi
          for godot in 4.4 4.5 4.6 4.7; do
            test -f "build/release/gdpp-$godot.zip"
            for host in mac-arm64 linux-x64 windows-x64; do
              test -f "build/release/gdpp-$godot-$host.zip"
            done
          done
          test "$(find build/release -maxdepth 1 -type f -name '*.zip' | wc -l)" -eq 16
      - name: Read release notes from CHANGELOG.md
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: >-
          python3 tools/extract_changelog.py
          --changelog CHANGELOG.md
          --version "$RELEASE_VERSION"
          --output build/release-notes.md
      - name: Create checksums
        working-directory: build/release
        run: LC_ALL=C sha256sum -- *.zip > SHA256SUMS
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ inputs.release_version }}
          name: ${{ inputs.release_version }}
          body_path: build/release-notes.md
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: |
            build/release/*.zip
            build/release/SHA256SUMS
      - name: Verify the published release contract
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          release="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_VERSION")"
          test "$(jq -r '.tag_name' <<< "$release")" = "$RELEASE_VERSION"
          test "$(jq -r '.name' <<< "$release")" = "$RELEASE_VERSION"
          test "$(jq -r '.draft' <<< "$release")" = false
          test "$(jq -r '.prerelease' <<< "$release")" = false
          test "$(jq '[.assets[] | select(.state == "uploaded" and .size > 0)] | length' \
            <<< "$release")" -eq 17
          test "$(jq '.assets | length' <<< "$release")" -eq 17
          test "$(jq '[.assets[] | select(.name | endswith(".zip"))] | length' \
            <<< "$release")" -eq 16
          for godot in 4.4 4.5 4.6 4.7; do
            test "$(jq --arg name "gdpp-$godot.zip" \
              '[.assets[] | select(.name == $name)] | length' <<< "$release")" -eq 1
            for host in mac-arm64 linux-x64 windows-x64; do
              test "$(jq --arg name "gdpp-$godot-$host.zip" \
                '[.assets[] | select(.name == $name)] | length' <<< "$release")" -eq 1
            done
          done
          test "$(jq '[.assets[] | select(.name == "SHA256SUMS")] | length' \
            <<< "$release")" -eq 1
          test "$(git ls-remote origin "refs/tags/$RELEASE_VERSION" | awk '{print $1}')" \
            = "$GITHUB_SHA"
          printf 'Published %s: %s\n' "$RELEASE_VERSION" \
            "$(jq -r '.html_url' <<< "$release")" >> "$GITHUB_STEP_SUMMARY"
