name: Release packages

on:
  pull_request:
  workflow_dispatch:
    inputs:
      publish:
        description: Create the GitHub Release after all package checks pass
        required: true
        type: boolean
        default: false
      release_tag:
        description: Existing or new v-prefixed tag used only when publish is enabled
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  binaries:
    name: Package / ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: linux-x86_64
          - os: macos-15
            artifact: macos-universal
          - os: windows-2025
            artifact: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - run: cmake --preset plugin
      - run: cmake --build --preset plugin --parallel
      - run: ctest --preset plugin
      - if: runner.os == 'macOS'
        run: cmake --preset release '-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64'
      - if: runner.os != 'macOS'
        run: cmake --preset release
      - run: cmake --build --preset release --parallel
      - run: ctest --preset release
      - name: Validate macOS Universal 2 contract
        if: runner.os == 'macOS'
        shell: bash
        run: |
          for binary in \
            example/addons/gdpp/binary/libgdpp_compiler.macos.universal.dylib \
            example/addons/gdpp/binary/libgdpp_fallback.macos.universal.dylib; do
            architectures="$(lipo -archs "$binary")"
            grep -qw arm64 <<<"$architectures"
            grep -qw x86_64 <<<"$architectures"
          done
          for architecture in arm64 x86_64; do
            compiler=example/addons/gdpp/binary/libgdpp_compiler.macos.universal.dylib
            fallback=example/addons/gdpp/binary/libgdpp_fallback.macos.universal.dylib
            test "$(nm -arch "$architecture" -gU "$compiler" | awk 'NF {print $NF}' | wc -l)" -eq 1
            nm -arch "$architecture" -gU "$compiler" | awk 'NF {print $NF}' | \
              grep -qx _gdpp_library_init
            test "$(nm -arch "$architecture" -gU "$fallback" | awk 'NF {print $NF}' | wc -l)" -eq 1
            nm -arch "$architecture" -gU "$fallback" | awk 'NF {print $NF}' | \
              grep -qx _gdpp_export_fallback_library_init
          done
          for descriptor in example/addons/gdpp/gdpp.gdextension; do
            if grep -E '^[^#]*macos\.[^=]*universal[^=]*=' "$descriptor"; then
              echo "Descriptor uses invalid universal runtime feature: $descriptor"
              exit 1
            fi
          done
      - name: Remove non-universal macOS variants
        if: runner.os == 'macOS'
        run: >-
          cmake -E rm -f
          example/addons/gdpp/binary/libgdpp_compiler.macos.arm64.dylib
          example/addons/gdpp/binary/libgdpp_compiler.macos.x86_64.dylib
          example/addons/gdpp/binary/libgdpp_fallback.macos.arm64.dylib
          example/addons/gdpp/binary/libgdpp_fallback.macos.x86_64.dylib
      - name: Remove example project native products
        run: >-
          cmake
          -DGDPP_ADDON_DIRECTORY=${{ github.workspace }}/example/addons/gdpp
          -P cmake/CleanAddonBuild.cmake
      - name: Validate compiler-only package
        shell: bash
        run: |
          package="example/addons/gdpp"
          test -f "$package/sdk/4.4/sdk.manifest"
          test -f "$package/sdk/4.5/sdk.manifest"
          test -f "$package/sdk/4.6/sdk.manifest"
          test -f "$package/sdk/4.7/sdk.manifest"
          test -n "$(find "$package/sdk/4.4/lib" -type f -name '*template_release*' -print -quit)"
          test -n "$(find "$package/sdk/4.5/lib" -type f -name '*template_release*' -print -quit)"
          test -n "$(find "$package/sdk/4.6/lib" -type f -name '*template_release*' -print -quit)"
          test -n "$(find "$package/sdk/4.7/lib" -type f -name '*template_release*' -print -quit)"
          test -n "$(find "$package/sdk/4.4/lib" -type f -name '*template_debug*' -print -quit)"
          test -n "$(find "$package/sdk/4.5/lib" -type f -name '*template_debug*' -print -quit)"
          test -n "$(find "$package/sdk/4.6/lib" -type f -name '*template_debug*' -print -quit)"
          test -n "$(find "$package/sdk/4.7/lib" -type f -name '*template_debug*' -print -quit)"
          test -f "$package/THIRD_PARTY_NOTICES.md"
          test ! -e "$package/build"
          if test -n "$(find "$package" \( -name '._*' -o -name '.DS_Store' -o \
              -name '__MACOSX' \) -print -quit)"; then
            echo "Package contains cross-platform filesystem metadata that Godot may parse as resources"
            exit 1
          fi
          if test -n "$(find "$package" -type f \( -name '*.py' -o \
              -name 'CMakeLists.txt' \) -print -quit)" || \
             test -n "$(find "$package/binary" -type f -name 'libgdpp_project*' -print -quit)"; then
            echo "Package contains a forbidden user-side build dependency or runtime compiler binary"
            exit 1
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: gdpp-${{ matrix.artifact }}
          path: example/addons/gdpp
          if-no-files-found: error

  android-target-packs:
    name: Package / Android arm64 / Godot ${{ matrix.godot }}
    strategy:
      fail-fast: false
      matrix:
        godot: [4.4, 4.5, 4.6, 4.7]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "ndk;28.1.13356709"
      - name: Build Android arm64 target pack
        shell: bash
        run: |
          cmake --preset dev \
            -DGDPP_ANDROID_NDK_ROOT="$ANDROID_SDK_ROOT/ndk/28.1.13356709" \
            -DGDPP_ANDROID_SDK_VERSIONS=${{ matrix.godot }} \
            -DGDPP_ANDROID_ARCHITECTURES=arm64
          cmake --build --preset dev --target gdpp_android_sdk --parallel
          destination="build/android-pack/addons/gdpp/sdk/${{ matrix.godot }}/android"
          mkdir -p "$destination"
          cp -R "example/addons/gdpp/sdk/${{ matrix.godot }}/android/arm64" "$destination/"
      - uses: actions/upload-artifact@v7
        with:
          name: gdpp-android-arm64-godot-${{ matrix.godot }}
          path: build/android-pack
          if-no-files-found: error

  web-target-packs:
    name: Package / Web / Godot ${{ matrix.godot }} / ${{ matrix.variant }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        godot: [4.4, 4.5, 4.6, 4.7]
        variant: [nothreads, threads]
        include:
          - godot: 4.4
            emscripten: 3.1.62
          - godot: 4.5
            emscripten: 4.0.0
          - godot: 4.6
            emscripten: 4.0.0
          - godot: 4.7
            emscripten: 4.0.0
    runs-on: ubuntu-24.04
    env:
      EM_CACHE: ${{ github.workspace }}/build/emscripten-cache
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ matrix.emscripten }}
          actions-cache-folder: build/ci/emsdk-cache
      - name: Build Web target pack
        shell: bash
        run: |
          cmake --preset dev \
            -DGDPP_WEB_SDK_VERSIONS=${{ matrix.godot }} \
            -DGDPP_WEB_VARIANTS=${{ matrix.variant }} \
            -DGDPP_WEB_EMCMAKE="$(command -v emcmake)"
          cmake --build --preset dev --target gdpp_web_sdk --parallel
          sdk="example/addons/gdpp/sdk/${{ matrix.godot }}/web/wasm32/${{ matrix.variant }}"
          grep -q '^api ${{ matrix.godot }}$' "$sdk/sdk.manifest"
          grep -q '^web_threads ${{ matrix.variant }}$' "$sdk/sdk.manifest"
          grep -q '^source_paths mapped$' "$sdk/sdk.manifest"
          if find "$sdk/lib" -maxdepth 1 -type f -name '*.a' -exec strings {} + \
              | grep -F "$GITHUB_WORKSPACE" >/dev/null; then
            echo 'Web target pack leaks the checkout path.'
            exit 1
          fi
          test -z "$(find third/godot-cpp -type d -name __pycache__ -print -quit)"
          test -z "$(find third/godot-cpp -type f -name '*.pyc' -print -quit)"
          destination="build/web-pack/addons/gdpp/sdk/${{ matrix.godot }}/web/wasm32"
          mkdir -p "$destination"
          cp -R \
            "example/addons/gdpp/sdk/${{ matrix.godot }}/web/wasm32/${{ matrix.variant }}" \
            "$destination/"
      - uses: actions/upload-artifact@v7
        with:
          name: gdpp-web-godot-${{ matrix.godot }}-${{ matrix.variant }}
          path: build/web-pack
          if-no-files-found: error

  publish:
    name: Publish / GitHub Release
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.publish &&
      startsWith(inputs.release_tag, 'v')
    needs: [binaries, android-target-packs, web-target-packs]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: build/artifacts
      - name: Create platform archives
        shell: bash
        run: |
          for directory in build/artifacts/*; do
            archive="${directory##*/}.tar.gz"
            tar --sort=name --mtime='@0' --owner=0 --group=0 --numeric-owner \
              -C "$directory" -czf "build/$archive" .
          done
          sha256sum build/*.tar.gz > build/SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            build/*.tar.gz
            build/SHA256SUMS
          generate_release_notes: true
