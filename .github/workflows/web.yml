name: Web target and browser runtime

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

env:
  EM_CACHE: ${{ github.workspace }}/build/emscripten-cache

jobs:
  target-sdk:
    name: Web SDK / Godot ${{ matrix.godot }} / ${{ matrix.variant }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        godot: [4.4, 4.5, 4.6, 4.7]
        variant: [nothreads, threads]
        include:
          - godot: 4.4
            emscripten: 3.1.62
          - godot: 4.5
            emscripten: 4.0.0
          - godot: 4.6
            emscripten: 4.0.0
          - godot: 4.7
            emscripten: 4.0.0
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ matrix.emscripten }}
          actions-cache-folder: build/ci/emsdk-cache
      - name: Configure Web target SDK builder
        shell: bash
        run: >-
          cmake --preset dev
          -DGDPP_WEB_SDK_VERSIONS=${{ matrix.godot }}
          -DGDPP_WEB_VARIANTS=${{ matrix.variant }}
          -DGDPP_WEB_EMCMAKE="$(command -v emcmake)"
      - name: Build debug and Release target SDK
        run: cmake --build --preset dev --target gdpp_web_sdk --parallel
      - name: Validate SDK and thread-mode isolation
        shell: bash
        run: |
          set -euo pipefail
          sdk="example/addons/gdpp/sdk/${{ matrix.godot }}/web/wasm32/${{ matrix.variant }}"
          grep -q '^platform web$' "$sdk/sdk.manifest"
          grep -q '^arch wasm32$' "$sdk/sdk.manifest"
          grep -q '^profiles debug,release$' "$sdk/sdk.manifest"
          grep -q '^web_threads ${{ matrix.variant }}$' "$sdk/sdk.manifest"
          grep -q '^compiler Emscripten$' "$sdk/sdk.manifest"
          grep -q '^source_paths mapped$' "$sdk/sdk.manifest"
          test "$(find "$sdk/lib" -maxdepth 1 -type f -name '*template_debug*.a' | wc -l)" -eq 1
          test "$(find "$sdk/lib" -maxdepth 1 -type f -name '*template_release*.a' | wc -l)" -eq 1
          if [[ '${{ matrix.variant }}' == nothreads ]]; then
            test "$(find "$sdk/lib" -maxdepth 1 -type f -name '*.nothreads.a' | wc -l)" -eq 2
          else
            test "$(find "$sdk/lib" -maxdepth 1 -type f -name '*.nothreads.a' | wc -l)" -eq 0
          fi
          if find "$sdk/lib" -maxdepth 1 -type f -name '*.a' -exec strings {} + \
              | grep -F "$GITHUB_WORKSPACE" >/dev/null; then
            echo 'Web target SDK leaks the checkout path.'
            exit 1
          fi
          test -z "$(find third/godot-cpp -type d -name __pycache__ -print -quit)"
          test -z "$(find third/godot-cpp -type f -name '*.pyc' -print -quit)"
      - uses: actions/upload-artifact@v4
        with:
          name: gdpp-web-godot-${{ matrix.godot }}-${{ matrix.variant }}
          path: example/addons/gdpp/sdk/${{ matrix.godot }}/web/wasm32/${{ matrix.variant }}
          if-no-files-found: error
          retention-days: 7

  browser:
    name: Web browser / Godot 4.5.2 / ${{ matrix.variant }}
    needs: target-sdk
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: nothreads
            preset: Web AOT
            output: web
            port: 8060
          - variant: threads
            preset: Web AOT Threads
            output: web-threads
            port: 8061
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.0
          actions-cache-folder: build/ci/emsdk-cache
      - id: godot
        uses: ./.github/actions/setup-godot
        with:
          version: 4.5.2
          templates: web
      - uses: actions/download-artifact@v4
        with:
          name: gdpp-web-godot-4.5-${{ matrix.variant }}
          path: example/addons/gdpp/sdk/4.5/web/wasm32/${{ matrix.variant }}
      - name: Install Wasm inspection tools
        run: sudo apt-get update && sudo apt-get install -y binaryen wabt
      - name: Build compiler plugin
        shell: bash
        env:
          GODOT: ${{ steps.godot.outputs.executable }}
        run: |
          cmake --preset plugin \
            -DGDPP_GODOT_EXECUTABLE="$GODOT" \
            -DGDPP_PACKAGE_GODOT_VERSIONS=4.5
          cmake --build --preset plugin --parallel
          ctest --preset plugin --output-on-failure
      - name: Export Web AOT package
        shell: bash
        env:
          GODOT: ${{ steps.godot.outputs.executable }}
        run: |
          set -euo pipefail
          root="example/addons/gdpp/build/${{ matrix.output }}"
          mkdir -p "$root"
          "$GODOT" --headless --editor --path example --quit-after 120 \
            2>&1 | tee "$root/warmup.log"
          "$GODOT" --headless --editor --path example --import \
            2>&1 | tee "$root/import.log"
          "$GODOT" --headless --editor --path example \
            --export-release '${{ matrix.preset }}' "$root/GDPPExample.html" \
            2>&1 | tee "$root/export.log"
          grep -q 'GDPP_AOT_SUMMARY scenes=' "$root/export.log"
          if grep -E -q '(^| )ERROR:|SCRIPT ERROR:|Unable to open' \
              "$root/import.log" "$root/export.log"; then
            echo 'Godot reported a Web import/export failure.'
            exit 1
          fi
      - name: Audit PCK, descriptor and Wasm side module
        shell: bash
        env:
          GODOT: ${{ steps.godot.outputs.executable }}
        run: |
          set -euo pipefail
          root="example/addons/gdpp/build/${{ matrix.output }}"
          mapfile -t modules < <(find "$root" -maxdepth 1 -type f \
            -name 'libgdpp_project.release.web.wasm32*.wasm' | LC_ALL=C sort)
          test "${#modules[@]}" -eq 1
          module="${modules[0]}"
          mkdir -p build/ci/web-validation
          wasm-validate --enable-all "$module"
          wasm-opt "$module" --all-features \
            -o "build/ci/web-validation/${{ matrix.variant }}.wasm"
          wasm-objdump -x "$module" > "$root/project-wasm.txt"
          grep -q 'gdpp_project_library_init' "$root/project-wasm.txt"
          if [[ '${{ matrix.variant }}' == threads ]]; then
            grep -q 'shared' "$root/project-wasm.txt"
          fi
          grep -q "$(basename "$module")" "$root/GDPPExample.html"

          mkdir -p build/pck-audit
          cp tools/audit_export_pck.gd build/pck-audit/audit_export_pck.gd
          printf '[application]\nconfig/name="GDPP Web PCK Audit"\n' > build/pck-audit/project.godot
          "$GODOT" --headless --path build/pck-audit \
            --script "$GITHUB_WORKSPACE/build/pck-audit/audit_export_pck.gd" -- \
            "$GITHUB_WORKSPACE/$root/GDPPExample.pck" \
            "$GITHUB_WORKSPACE/$root" "$GITHUB_WORKSPACE/$module" \
            2>&1 | tee "$root/pck-audit.log"
          grep -q '^PCK_AUDIT_VIOLATIONS=0$' "$root/pck-audit.log"
          grep -q '^PCK_AUDIT_PROJECT_LIBRARIES=1$' "$root/pck-audit.log"
      - name: Run Chromium smoke test with cross-origin isolation
        shell: bash
        run: |
          set -euo pipefail
          root="example/addons/gdpp/build/${{ matrix.output }}"
          python3 tools/serve_web.py "$root" --port '${{ matrix.port }}' \
            > "$root/server.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for _ in {1..30}; do
            if curl --fail --silent --head \
                "http://127.0.0.1:${{ matrix.port }}/GDPPExample.html" \
                > "$root/headers.txt"; then
              break
            fi
            sleep 1
          done
          grep -qi '^Cross-Origin-Opener-Policy: same-origin' "$root/headers.txt"
          grep -qi '^Cross-Origin-Embedder-Policy: require-corp' "$root/headers.txt"
          google-chrome --headless=new --no-sandbox \
            --use-gl=swiftshader --enable-webgl --enable-unsafe-swiftshader \
            --autoplay-policy=no-user-gesture-required \
            --enable-logging=stderr --v=0 --virtual-time-budget=20000 --dump-dom \
            "http://127.0.0.1:${{ matrix.port }}/GDPPExample.html" \
            > "$root/browser-dom.txt" 2> "$root/browser.log"
          grep -q 'data-gdpp-status="ok"' "$root/browser-dom.txt"
          if grep -q 'data-gdpp-status="invalid"' "$root/browser-dom.txt"; then
            echo 'Web runtime reported an invalid AOT behavior oracle.'
            exit 1
          fi
          if grep -E -q 'GDPP_EXPORTED_PROPERTIES_INVALID|LinkError|RuntimeError|CompileError|SCRIPT ERROR' \
              "$root/browser.log"; then
            echo 'Web runtime emitted a forbidden diagnostic.'
            exit 1
          fi
      - name: Upload Web evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gdpp-web-runtime-godot-4.5.2-${{ matrix.variant }}
          path: example/addons/gdpp/build/${{ matrix.output }}
          if-no-files-found: warn
          retention-days: 14
